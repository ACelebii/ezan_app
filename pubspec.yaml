name: ezan_vakti_uygulamasi
description: "Ezan vakti takip uygulaması"
publish_to: 'none'

# 1. SDK KISITLAMASI
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  geolocator: ^14.0.2
  audioplayers: ^5.2.1
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.2
  permission_handler: ^12.0.1
  flutter_compass: ^0.8.1
  intl: ^0.18.1
  scrollable_positioned_list: ^0.3.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.3.0
  provider: ^6.1.5+1
  google_sign_in: 6.2.1
  google_maps_flutter: ^2.17.0
  html: ^0.15.4
  syncfusion_flutter_pdfviewer: ^33.1.46
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  flutter_dotenv: ^6.0.1
  url_launcher: ^6.3.0
  dio: ^5.7.0
  connectivity_plus: ^6.0.3
  workmanager: ^0.5.2
  get_it: ^8.0.3

# 2. GELİŞTİRİCİ ARAÇLARI (İkon paketi buraya gelir)
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# 3. İKON OLUŞTURUCU AYARLARI
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/Images/app_icon.png"
  adaptive_icon_background: "#EFEFF4"
  adaptive_icon_foreground: "assets/Images/app_icon.png"

# 4. FLUTTER GENEL AYARLARI
flutter:
  uses-material-design: true
  assets:
    - assets/Images/
    - assets/ezan.mp3
    - assets/uyari.mp3.mp3
    - .env
    - .env_production
    - assets/dualar.json